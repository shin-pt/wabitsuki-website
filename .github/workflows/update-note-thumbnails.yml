name: Update Note Thumbnails

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  schedule:
    - cron: '0 */6 * * *'  # 6時間ごと

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save thumbnails
        run: node scripts/fetch-note-thumbnails.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/note-thumbnails.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update note thumbnails"
            git push
          fi
